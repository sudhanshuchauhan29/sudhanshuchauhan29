<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi Timezone Digital Clock</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 class="title">⏰ World Time Zone Clock</h1>
        
        <div class="controls">
            <input type="text" id="timezoneInput" placeholder="Enter timezone (e.g., UTC, EST, IST, JST)" class="timezone-input">
            <button id="addTimezoneBtn" class="add-btn">+ Add Timezone</button>
        </div>

        <div class="clock-grid" id="clockGrid">
            <!-- Clock cards will be dynamically added here -->
        </div>

        <div class="preset-timezones">
            <h3>Quick Add:</h3>
            <button class="preset-btn" data-timezone="UTC">UTC</button>
            <button class="preset-btn" data-timezone="America/New_York">EST (New York)</button>
            <button class="preset-btn" data-timezone="Europe/London">GMT (London)</button>
            <button class="preset-btn" data-timezone="Europe/Paris">CET (Paris)</button>
            <button class="preset-btn" data-timezone="Asia/Dubai">GST (Dubai)</button>
            <button class="preset-btn" data-timezone="Asia/Kolkata">IST (India)</button>
            <button class="preset-btn" data-timezone="Asia/Bangkok">ICT (Bangkok)</button>
            <button class="preset-btn" data-timezone="Asia/Tokyo">JST (Tokyo)</button>
            <button class="preset-btn" data-timezone="Asia/Shanghai">CST (China)</button>
            <button class="preset-btn" data-timezone="Australia/Sydney">AEDT (Sydney)</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
